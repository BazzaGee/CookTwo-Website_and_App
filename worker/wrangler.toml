name = "couples-food-system-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "HOUSEHOLD_SYNC"
class_name = "HouseholdSync"

[[durable_objects.bindings]]
name = "INVITE_STORE"
class_name = "InviteStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HouseholdSync", "InviteStore"]

[[d1_databases]]
binding = "DB"
database_name = "couples-food-system"
database_id = "a1d7c319-cd3f-4f82-9d97-6e63eff19fca"
migrations_dir = "migrations"

[vars]
AI_PROVIDER = "deepseek"

[env.staging]
name = "couples-food-system-api-staging"

[env.production]
name = "couples-food-system-api"
